```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deepak Ride Driver</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#FFD400;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
max-width:600px;
margin:20px auto;
padding:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
margin-bottom:20px;
}

.status{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
}

.online{
background:#28a745;
color:#fff;
}

.accept{
background:#007bff;
color:#fff;
width:100%;
margin-top:15px;
}

#rideBox{
display:none;
}

</style>

</head>

<body>

<header>

<h2>🚖 Driver Panel</h2>

<button id="onlineBtn" class="online">
Go Online
</button>

</header>

<div class="container">

<div class="card">

<h3>Status</h3>

<p id="driverStatus">
Offline
</p>

</div>

<div class="card" id="rideBox">

<h3>New Ride Request</h3>

<p><b>Pickup:</b> <span id="pickup"></span></p>

<p><b>Drop:</b> <span id="drop"></span></p>

<p><b>Ride:</b> <span id="rideType"></span></p>

<p><b>Fare:</b> ₹ <span id="fare"></span></p>

<button class="accept" onclick="acceptRide()">
Accept Ride
</button>

</div>

</div>

<script type="module">

import {db} from "./firebase.js";

import {

collection,

query,

where,

getDocs,

updateDoc,

doc

}

from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

let online=false;

let currentRideId="";

const btn=document.getElementById("onlineBtn");

btn.onclick=function(){

online=!online;

document.getElementById("driverStatus").innerHTML=
online ? "Online" : "Offline";

btn.innerHTML=
online ? "Go Offline" : "Go Online";

if(online){

loadRide();

}

}

async function loadRide(){

const q=query(
collection(db,"rides"),
where("status","==","Pending")
);

const snap=await getDocs(q);

snap.forEach((ride)=>{

const data=ride.data();

currentRideId=ride.id;

document.getElementById("pickup").innerHTML=data.pickup;

document.getElementById("drop").innerHTML=data.drop;

document.getElementById("rideType").innerHTML=data.rideType;

document.getElementById("fare").innerHTML=data.fare;

document.getElementById("rideBox").style.display="block";

});

}

window.acceptRide=async function(){

if(currentRideId=="") return;

await updateDoc(doc(db,"rides",currentRideId),{

status:"Accepted",

driverName:"Deepak Driver",

driverPhone:"9876543210",

vehicleNumber:"RJ19 AB 1234"

});

alert("Ride Accepted");

location.href="ride.html";

}

</script>

</body>

</html>
```
