<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Track Ride</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f5f5;
}

header{

background:#FFD400;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;

}

.container{

max-width:500px;
margin:25px auto;
padding:20px;

}

.card{

background:white;
border-radius:15px;
padding:20px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,.15);

}

.status{

font-size:22px;
font-weight:bold;
color:#28a745;
margin:15px 0;

}

.driver{

font-size:18px;
line-height:35px;

}

button{

width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:17px;
cursor:pointer;
margin-top:10px;

}

.call{

background:#28a745;
color:white;

}

.cancel{

background:#dc3545;
color:white;

}

.map{

height:250px;
background:#ddd;
display:flex;
justify-content:center;
align-items:center;
border-radius:10px;
margin-bottom:20px;

}

</style>

</head>

<body>

<header>

🚖 Deepak Ride

</header>

<div class="container">

<div class="map">

Live Map

</div>

<div class="card">

<div class="status" id="status">

Searching Driver...

</div>

<div class="driver">

<b>Driver :</b>
<span id="driverName">Waiting...</span>

<br>

<b>Vehicle :</b>
<span id="vehicle">--</span>

<br>

<b>Phone :</b>
<span id="phone">--</span>

<br>

<b>Fare :</b>

₹ <span id="fare">0</span>

</div>

<button class="call" onclick="callDriver()">

Call Driver

</button>

<button class="cancel" onclick="cancelRide()">

Cancel Ride

</button>

</div>

</div>

<script type="module">

import {db} from "./firebase.js";

import {

doc,

getDoc,

updateDoc

}

from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const rideId=localStorage.getItem("rideId");

async function loadRide(){

if(!rideId)return;

const snap=await getDoc(doc(db,"rides",rideId));

if(!snap.exists()) return;

const data=snap.data();

document.getElementById("status").innerHTML=data.status;

document.getElementById("fare").innerHTML=data.fare;

document.getElementById("driverName").innerHTML=data.driverName || "Searching...";

document.getElementById("vehicle").innerHTML=data.vehicleNumber || "--";

document.getElementById("phone").innerHTML=data.driverPhone || "--";

}

loadRide();

setInterval(loadRide,3000);

window.callDriver=function(){

const phone=document.getElementById("phone").innerHTML;

if(phone=="--"){

alert("Driver not assigned");

return;

}

location.href="tel:"+phone;

}

window.cancelRide=async function(){

if(!rideId)return;

await updateDoc(doc(db,"rides",rideId),{

status:"Cancelled"

});

alert("Ride Cancelled");

location.href="customer.html";

}

</script>

</body>
</html>
