```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Ride History</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins,sans-serif;
background:#f5f5f5;
margin:0;
}

header{
background:#FFD400;
padding:18px;
font-size:24px;
font-weight:bold;
text-align:center;
}

.container{
max-width:900px;
margin:25px auto;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.status{
font-weight:bold;
}

</style>

</head>

<body>

<header>

Ride History

</header>

<div class="container" id="history"></div>

<script type="module">

import {db} from "./firebase.js";

import{

collection,
getDocs,
orderBy,
query

}from"https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const box=document.getElementById("history");

const q=query(

collection(db,"rides"),

orderBy("createdAt","desc")

);

const snap=await getDocs(q);

snap.forEach(doc=>{

const ride=doc.data();

box.innerHTML+=`

<div class="card">

<h3>${ride.rideType.toUpperCase()}</h3>

<p><b>Pickup :</b> ${ride.pickup}</p>

<p><b>Drop :</b> ${ride.drop}</p>

<p><b>Fare :</b> ₹${ride.fare}</p>

<p class="status">${ride.status}</p>

</div>

`;

});

</script>

</body>
</html>
```
