<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌍 Deepak Dabi Earth</title>

<link rel="manifest" href="manifest.json">

<link href="https://cesium.com/downloads/cesiumjs/releases/1.133/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
}

#cesiumContainer{
width:100%;
height:100%;
}

.topbar{

position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
z-index:1000;

background:white;

padding:10px;

border-radius:12px;

display:flex;

gap:10px;

box-shadow:0 5px 20px rgba(0,0,0,.3);

}

.topbar input{

width:300px;

padding:10px;

border-radius:8px;

border:1px solid #ccc;

}

.topbar button{

padding:10px 15px;

border:none;

border-radius:8px;

background:#0078ff;

color:white;

cursor:pointer;

font-weight:bold;

}

.topbar button:hover{

background:#005ec2;

}

.logo{

position:absolute;

bottom:15px;

left:15px;

z-index:999;

background:rgba(0,0,0,.6);

color:white;

padding:10px 15px;

border-radius:10px;

font-size:18px;

font-weight:bold;

}

</style>

</head>

<body>

<div id="cesiumContainer"></div>

<div class="topbar">

<input
id="searchBox"
placeholder="Search any city or place...">

<button id="searchBtn">
🔍 Search
</button>

<button id="locationBtn">
📍 My Location
</button>

<button id="earthBtn">
🌍 Earth
</button>

<button id="fullscreenBtn">
⛶ Fullscreen
</button>

</div>

<div class="logo">
🌍 Deepak Dabi Earth
</div>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.133/Build/Cesium/Cesium.js"></script>

<script src="script.js"></script>

</body>
</html>
