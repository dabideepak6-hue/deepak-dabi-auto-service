<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepak Dabi Auto Service</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(to bottom,#ffb300,#ff9800);
overflow:hidden;
height:100vh;
}

.header{
text-align:center;
padding:20px;
color:#fff;
}

.header h1{
font-size:40px;
font-weight:bold;
}

.header p{
font-size:20px;
margin-top:10px;
}

.buttons{
display:flex;
justify-content:center;
gap:15px;
margin-top:15px;
}

.btn{
padding:12px 25px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
text-decoration:none;
color:white;
}

.call{
background:#2196f3;
}

.whatsapp{
background:#25D366;
}

.sky{
position:absolute;
width:100%;
height:75%;
background:linear-gradient(#87CEEB,#E0F7FA);
}

.cloud{
position:absolute;
width:120px;
height:60px;
background:white;
border-radius:50px;
animation:cloudmove 30s linear infinite;
}

.cloud:nth-child(1){
top:50px;
left:-150px;
}

.cloud:nth-child(2){
top:120px;
left:-300px;
animation-duration:40s;
}

@keyframes cloudmove{
from{transform:translateX(0);}
to{transform:translateX(1600px);}
}

.auto{
position:absolute;
bottom:120px;
width:350px;
animation:drive 12s linear infinite;
}

.auto img{
width:100%;
filter:drop-shadow(0px 10px 20px rgba(0,0,0,.5));
}

@keyframes drive{
0%{
left:-400px;
}
100%{
left:100%;
}
}

.road{
position:absolute;
bottom:0;
width:100%;
height:120px;
background:#333;
}

.road:before{
content:"";
position:absolute;
top:55px;
width:100%;
height:8px;
background:repeating-linear-gradient(
to right,
white 0px,
white 50px,
transparent 50px,
transparent 100px
);
animation:roadmove 1s linear infinite;
}

@keyframes roadmove{
from{
background-position:0;
}
to{
background-position:-100px;
}
}

.footer{
position:absolute;
bottom:130px;
width:100%;
text-align:center;
font-size:22px;
font-weight:bold;
color:#fff;
text-shadow:2px 2px 5px black;
}
</style>

</head>
<body>

<div class="sky">
<div class="cloud"></div>
<div class="cloud"></div>
</div>

<div class="header">
<h1>🚕 Deepak Dabi Auto Service</h1>
<p>24x7 Auto Booking Service - Jodhpur</p>

<div class="buttons">
<a href="tel:9521393991" class="btn call">📞 Call Now</a>
<a href="https://wa.me/919521393991" class="btn whatsapp">💬 WhatsApp</a>
</div>
</div>

<div class="footer">
Safe • Fast • Affordable Ride
</div>

<div class="auto">
<img src="auto.jpg" alt="Auto">
</div>

<div class="road"></div>

</body>
</html>
