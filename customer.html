```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deepak Ride - Customer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#FFD400;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
color:#000;
}

.logout{
background:#000;
color:#fff;
padding:10px 20px;
border-radius:10px;
text-decoration:none;
}

.container{
max-width:600px;
margin:20px auto;
padding:20px;
background:#fff;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

#map{
height:400px;
border-radius:15px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:15px;
margin-bottom:15px;
font-size:16px;
border:1px solid #ccc;
border-radius:10px;
}

.fare{
background:#FFD400;
padding:20px;
text-align:center;
font-size:25px;
font-weight:bold;
border-radius:10px;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
font-size:18px;
background:#000;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#333;
}

</style>

</head>

<body>

<header>

<h2>🚖 Deepak Ride</h2>

<a href="index.html" class="logout">

Logout

</a>

</header>

<div class="container">

<div id="map"></div>

<input
type="text"
id="pickup"
placeholder="Pickup Location"
readonly>

<input
type="text"
id="drop"
placeholder="Drop Location"
readonly>

<select id="ride">

<option value="bike">Bike</option>

<option value="auto">Auto</option>

<option value="cab">Cab</option>

</select>

<input
type="number"
id="distance"
placeholder="Distance (KM)"
readonly>

<div class="fare">

₹ <span id="fare">0</span>

</div>

<button onclick="bookRide()">

Book Ride

</button>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module" src="js/map.js"></script>

<script type="module" src="js/booking.js"></script>

</body>

</html>
```
