<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Auto | Deepak Dabi Auto Service</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header>

<div class="logo">

🚖 Deepak Dabi Auto Service

</div>

<a href="index.html" class="home-btn">

🏠 Home

</a>

</header>

<section class="booking-page">

<div class="glass booking-box">

<h1>

Book Your Ride

</h1>

<input
type="text"
id="name"
placeholder="Customer Name">

<input
type="tel"
id="mobile"
placeholder="Mobile Number">

<div class="gps">

<input
type="text"
id="pickup"
placeholder="Pickup Location">

<button
onclick="getLocation()">

📍 GPS

</button>

</div>

<input
type="text"
id="drop"
placeholder="Drop Location">

<select id="vehicle">

<option>

Auto Rickshaw

</option>

<option>

Mini Cab

</option>

<option>

SUV

</option>

</select>

<input
type="number"
id="km"
placeholder="Distance (KM)">

<button
onclick="calculateFare()">

💰 Calculate Fare

</button>

<h2 id="price">

Estimated Fare ₹0

</h2>

<select id="payment">

<option>

Cash

</option>

<option>

UPI

</option>

<option>

Card

</option>

</select>

<button
onclick="bookNow()"
class="book-btn">

🚖 Confirm Booking

</button>

<a
href="tel:9521393991"
class="call-btn">

📞 Call Driver

</a>

</div>

</section>

<script src="script.js"></script>

</body>

</html>
