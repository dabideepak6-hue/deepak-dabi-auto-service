<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deepak Ride Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#FFD400;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{

width:360px;
background:#fff;
padding:35px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.2);

}

.logo{

text-align:center;
font-size:30px;
font-weight:bold;
margin-bottom:20px;

}

h2{

text-align:center;
margin-bottom:20px;

}

select,
input{

width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;

}

button{

width:100%;
padding:15px;
border:none;
background:#000;
color:#fff;
font-size:17px;
border-radius:10px;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#333;

}

.link{

text-align:center;
margin-top:15px;

}

.link a{

text-decoration:none;
color:#000;
font-weight:bold;

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">
🚖 Deepak Ride
</div>

<h2>Login</h2>

<select id="role">

<option value="customer">Customer</option>

<option value="driver">Driver</option>

<option value="admin">Admin</option>

</select>

<input
type="tel"
id="mobile"
placeholder="Enter Mobile Number"
maxlength="10">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">

Login

</button>

<div class="link">

<a href="#">Create New Account</a>

</div>

</div>

<script>

function login(){

let role=document.getElementById("role").value;

let mobile=document.getElementById("mobile").value;

let password=document.getElementById("password").value;

if(mobile.length!=10){

alert("Enter Valid Mobile Number");

return;

}

if(password==""){

alert("Enter Password");

return;

}

if(role=="customer"){

window.location="customer.html";

}

else if(role=="driver"){

window.location="driver.html";

}

else{

window.location="admin.html";

}

}

</script>

</body>

</html>
