```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Driver Wallet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#FFD400;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:900px;
margin:20px auto;
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
text-align:center;
}

.card h2{
margin-top:10px;
font-size:30px;
}

table{
width:100%;
background:#fff;
border-collapse:collapse;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

th{
background:#000;
color:#fff;
padding:15px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

button{
margin-top:20px;
padding:15px 25px;
background:#000;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

</style>

</head>

<body>

<header>

💰 Driver Wallet

</header>

<div class="container">

<div class="cards">

<div class="card">

<h3>Total Earnings</h3>

<h2>₹<span id="earnings">0</span></h2>

</div>

<div class="card">

<h3>Today's Earnings</h3>

<h2>₹<span id="today">0</span></h2>

</div>

<div class="card">

<h3>Total Rides</h3>

<h2><span id="rides">0</span></h2>

</div>

<div class="card">

<h3>Wallet Balance</h3>

<h2>₹<span id="wallet">0</span></h2>

</div>

</div>

<table>

<thead>

<tr>

<th>Date</th>

<th>Pickup</th>

<th>Drop</th>

<th>Fare</th>

<th>Status</th>

</tr>

</thead>

<tbody id="history">

</tbody>

</table>

<button onclick="withdrawMoney()">

Withdraw

</button>

</div>

<script type="module">

import {db} from "./firebase.js";

import {

collection,

getDocs,

query,

where

}

from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

let total=0;

let today=0;

let rides=0;

const tbody=document.getElementById("history");

const driverName="Deepak Driver";

const q=query(

collection(db,"rides"),

where("driverName","==",driverName),

where("status","==","Completed")

);

const snap=await getDocs(q);

const todayDate=new Date().toDateString();

snap.forEach(doc=>{

const ride=doc.data();

rides++;

total+=Number(ride.fare);

const rideDate=ride.completedAt?.toDate
? ride.completedAt.toDate().toDateString()
: "";

if(rideDate===todayDate){

today+=Number(ride.fare);

}

tbody.innerHTML+=`

<tr>

<td>${rideDate || "-"}</td>

<td>${ride.pickup}</td>

<td>${ride.drop}</td>

<td>₹${ride.fare}</td>

<td>${ride.status}</td>

</tr>

`;

});

document.getElementById("earnings").innerHTML=total;

document.getElementById("today").innerHTML=today;

document.getElementById("rides").innerHTML=rides;

document.getElementById("wallet").innerHTML=total;

window.withdrawMoney=function(){

alert("Withdraw Request Submitted");

}

</script>

</body>
</html>
```
